<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Instagram Video Controller Options</title>
    <style>
        body {
            box-sizing: border-box;
            width: 320px;
            margin: 0;
            padding: 16px;
            font-family: Arial, sans-serif;
            color: #111;
            background: #fff;
        }

        h1 {
            margin: 0 0 14px;
            font-size: 16px;
            line-height: 1.3;
        }

        label {
            display: flex;
            align-items: flex-start;
            gap: 8px;
            font-size: 13px;
            line-height: 1.45;
        }

        input {
            margin-top: 2px;
        }

        .hint {
            margin: 10px 0 0 22px;
            color: #555;
            font-size: 12px;
            line-height: 1.45;
        }

        .status {
            min-height: 18px;
            margin-top: 12px;
            color: #216e39;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1 id="pageTitle">Instagram Video Controller</h1>
    <label>
        <input type="checkbox" id="debugRemoteVisible">
        <span id="debugRemoteLabel">Developer debug remote</span>
    </label>
    <p class="hint" id="debugRemoteHint">When enabled, automatic execution stops and step buttons appear on the right side of the page.</p>
    <div class="status" id="status" aria-live="polite"></div>

    <script src="options.js"></script>
</body>
</html>
